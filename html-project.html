<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Page</title>
</head>
<body>
    <header>
        <h1>Personal Profile Page</h1>
        <a href="#">Home</a>
    </header>

    <main>
        <section>
            <p>My name is Kyaw Moe Htun</p>
            <p>I am a Computer Engineer</p>
        </section>

        <section>
            <table border="1">
                <tr>
                    <th>Skill Name</th>
                    <th>Level</th>
                </tr>

                <tr>
                    <td>Computer Programming</td>
                    <td>3</td>
                </tr>

                <tr>
                    <td>Computer A +</td>
                    <td>3</td>
                </tr>
            </table>
        </section>

        <br><br>

        <section>
            <form action="">
                <label for="name">Name</label>
                <input type="text" id="name" name="name">
                <br><br>

                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <br><br>

                <label for="photo">Photo</label>
                <input type="file" name="photo" id="photo" accept="image/.*">
                <br><br>

                <label for="message">Message</label>
                <textarea name="message" id="message" name="message"></textarea>
                <br><br>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
</body>
</html>
